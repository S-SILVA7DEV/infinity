<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity ❤️</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    
</head>
<body>
    <main id="welcome-screen">
        <section class="welcome-screen">
            <div class="stars"></div>
                <div class=" stars stars-1"></div>
                <div class=" stars stars-2"></div>
                <div class=" stars stars-3"></div>
            
            <div class="glass-card">
                <header class="hero">
                    <h1>Infinity ❤️</h1>
                    <span class="subtitle">
                        um lugar onde nossa história continua crescendo.
                    </span>
                </header>
                
                <section class="message">
                    <p>
                        Quero que saiba que este aplicativo nunca estará realmente pronto.
                    </p>
                    <p>
                        Assim como o meu amor por você,
                        ele continuará crescendo com o tempo.
                    </p>
                    
                </section>
                <button class="start-button">
                    Começar nossa história ❤️
                </button>
            </div>

        </section>
    </main>
    <main id="loading-screen">
        <div class="loading-content">
            <h1>Infinity ❤️</h1>
            <p>Carregando memórias...</p>
        </div>

    </main>
    <main id="app">

    </main>
        <script src="js/app.js"></script>
</body>
</html>
